<style>
  :root{ --ink:#222728; --muted:#798286; --grad:linear-gradient(90deg,#E96384 0%,#3D00FF 100%); }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ font-family:"Roboto",Arial,sans-serif; color:var(--ink); min-height:100vh; display:flex;
        align-items:center; justify-content:center; padding:24px;
        background:linear-gradient(125deg,#FCEEF3 0%,#F4EEFD 50%,#EEF1FE 100%); }
  .card{ width:100%; max-width:420px; background:#fff; border:1px solid #efe9f3; border-radius:18px;
         padding:38px 34px; box-shadow:0 30px 70px -34px rgba(61,0,255,.28); text-align:left; }
  .wm{ font-family:"Overpass"; font-weight:700; font-size:13px; letter-spacing:.05em; display:flex; align-items:center; gap:8px; color:var(--ink); }
  .wm .dot{ width:11px; height:11px; border-radius:50%; background:var(--grad); }
  .lock{ margin-top:26px; font-size:26px; }
  h1{ font-family:"Overpass"; font-weight:700; font-size:23px; letter-spacing:-.02em; margin-top:8px; color:var(--ink); }
  p.sub{ color:var(--muted); font-size:14px; margin-top:8px; }
  form{ margin-top:22px; }
  input{ width:100%; font-family:"Roboto"; font-size:15px; padding:13px 15px; border:1.5px solid #e0e2e4;
         border-radius:10px; outline:none; transition:.15s; }
  input:focus{ border-color:#7a4bd6; box-shadow:0 0 0 3px rgba(122,75,214,.14); }
  button{ width:100%; margin-top:13px; font-family:"Overpass"; font-weight:700; font-size:15px; color:#fff;
          border:none; border-radius:10px; padding:14px; cursor:pointer; background:var(--grad); letter-spacing:.01em; }
  button:active{ transform:translateY(1px); }
  .err{ color:#d11e3a; font-size:13.5px; margin-top:12px; min-height:18px; font-weight:500; }
  .foot{ margin-top:22px; font-size:11px; color:#aab0b3; letter-spacing:.04em; }
</style>

  function b64(s){ var bin=atob(s), a=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a.buffer; }
  async function unlock(){
    var err=document.getElementById('err'); err.textContent='';
    var pw=document.getElementById('pw').value;
    try{
      var base=await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
      var key=await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(D.salt), iterations:D.iter, hash:'SHA-256'},
        base, {name:'AES-GCM', length:256}, false, ['decrypt']);
      var pt=await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(D.iv)}, key, b64(D.ct));
      var html=new TextDecoder().decode(pt);
      document.open(); document.write(html); document.close();
    }catch(e){ err.textContent='Incorrect password. Please try again.'; }
  }
  document.getElementById('go').addEventListener('click', unlock);
  document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); unlock(); }});
